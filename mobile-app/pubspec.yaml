name: pamoja
description: PAMOJA - The Business Operating System Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  http: ^1.1.0
  shared_preferences: ^2.1.0
  sqflite: ^2.2.0
  path_provider: ^2.0.0
  intl: ^0.19.0
  uuid: ^4.0.0
  barcode_widget: ^2.0.3
  qr_flutter: ^4.1.0
  pdf: ^3.10.0
  printing: ^5.11.0
  permission_handler: ^11.4.3
  camera: ^0.10.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
